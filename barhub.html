function TabBalance({data,semana,grupos,overrides,comidaMap,ventasProp,loadData}){
  const compras   = data.compras    || [];
  const gfData    = data.gastosFijos|| [];
  const gastosMes = data.gastosMes  || {};
  const nomina    = calcNomina(data.asistencias,data.ventas,overrides,comidaMap,ventasProp);

  // ── Vista toggle: semanal / mensual ──────────────────────────────────────
  const [vista,setVista]=useState("semanal");
  const [mesData,setMesData]=useState(null);
  const [mesLoading,setMesLoading]=useState(false);

  const loadMes=useCallback(async()=>{
    if(!gastosMes?.año||!gastosMes?.mes)return;
    setMesLoading(true);
    try{
      const r=await fetch(API+"/api/dashboard/balance-mensual?año="+gastosMes.año+"&mes="+gastosMes.mes);
      const d=await r.json();
      if(d.ok)setMesData(d);
    }catch(e){console.error("[balance-mensual]",e);}
    setMesLoading(false);
  },[gastosMes?.año,gastosMes?.mes]);

  useEffect(()=>{
    if(vista==="mensual")loadMes();
  },[vista,loadMes]);

  // ── Gastos Fijos form state ──────────────────────────────────────────────
  const [gfEdit,setGfEdit]=useState(null);
  const [gfSaving,setGfSaving]=useState(false);

  const saveGF=async(concepto,area,monto)=>{
    if(!gastosMes.año||!gastosMes.mes)return;
    setGfSaving(true);
    await fetch(API+"/api/gastos",{method:"POST",headers:{"Content-Type":"application/json","x-app-secret":"BarHub2026"},
      body:JSON.stringify({año:gastosMes.año,mes:gastosMes.mes,concepto,area,monto:+monto||0})});
    setGfSaving(false);setGfEdit(null);
    if(loadData)await loadData(semana.key);
  };
  const delGF=async(id)=>{
    if(!confirm("¿Eliminar este gasto fijo?"))return;
    await fetch(API+"/api/gastos/"+id,{method:"DELETE",headers:{"x-app-secret":"BarHub2026"}});
    if(loadData)await loadData(semana.key);
  };

  // ── Ventas split ──────────────────────────────────────────────────────────
  // Fuente primaria: ventas_grupo (top-level). Fallback: ventas_mesero total sin split.
  const hasGrupos=grupos&&grupos.length>0;
  const topGrupos=(grupos||[]).filter(g=>!g.es_subgrupo);
  const ventasBar   =hasGrupos?topGrupos.filter(g=>g.grupo!=="Alimentos").reduce((a,g)=>a+(g.venta||0),0):0;
  const ventasCocina=hasGrupos?topGrupos.filter(g=>g.grupo==="Alimentos").reduce((a,g)=>a+(g.venta||0),0):0;
  // Si no hay grupos usar ventas_mesero como total (sin split)
  const ventasFallback=!hasGrupos?(data.ventas||[]).reduce((a,m)=>a+(m.venta||0),0):0;
  const ventasTot=hasGrupos?(ventasBar+ventasCocina):ventasFallback;

  // ── Nómina split ──────────────────────────────────────────────────────────
  // Bar: Mesero, Barra, Caja, Comodín (dept="bar")
  // Cocina: área "Cocina" (dept="cocina")
  // Admin: Andrea, Gerardo (dept="admin") → línea propia, suma a Bar en utilidad
  const nomBar  =nomina.filter(e=>e.dept==="bar")  .reduce((a,e)=>a+e.total,0);
  const nomCoc  =nomina.filter(e=>e.dept==="cocina").reduce((a,e)=>a+e.total,0);
  const nomAdmin=nomina.filter(e=>e.dept==="admin") .reduce((a,e)=>a+e.total,0);
  const nomBarConAdmin=nomBar+nomAdmin; // para cálculo de utilidad Bar
  const nomTot  =nomBar+nomCoc+nomAdmin;

  // ── Compras split ─────────────────────────────────────────────────────────
  const cpBar  =compras.filter(c=>c.area==="bar")       .reduce((a,c)=>a+(c.monto||0),0);
  const cpCoc  =compras.filter(c=>c.area==="cocina")    .reduce((a,c)=>a+(c.monto||0),0);
  const cpComp =compras.filter(c=>c.area==="compartido").reduce((a,c)=>a+(c.monto||0),0);
  // Compartido se reparte por % de ventas (o 70/30 si no hay split)
  const barPct =ventasTot>0&&hasGrupos?ventasBar/ventasTot:0.7;
  const cocPct =1-barPct;
  const cpBarT =cpBar +cpComp*barPct;
  const cpCocT =cpCoc +cpComp*cocPct;
  const cpTot  =cpBarT+cpCocT;

  // ── Gastos Fijos split (÷4.33 semanas/mes) ────────────────────────────────
  const gfBar  =gfData.filter(g=>g.area==="bar")       .reduce((a,g)=>a+(g.monto||0),0);
  const gfCoc  =gfData.filter(g=>g.area==="cocina")    .reduce((a,g)=>a+(g.monto||0),0);
  const gfComp =gfData.filter(g=>g.area==="compartido").reduce((a,g)=>a+(g.monto||0),0);
  const gfBarT =(gfBar +gfComp*barPct)/4.33;
  const gfCocT =(gfCoc +gfComp*cocPct)/4.33;
  const gfTot  =gfBarT+gfCocT;

  // ── Utilidades ────────────────────────────────────────────────────────────
  const utilBar=ventasBar -nomBarConAdmin-cpBarT-gfBarT;
  const utilCoc=ventasCocina-nomCoc     -cpCocT-gfCocT;
  const utilTot=ventasTot  -nomTot      -cpTot -gfTot;
  const margen =ventasTot>0?utilTot/ventasTot*100:0;

  const areaColor={bar:C.blue,cocina:C.amber,compartido:C.teal,admin:C.purple};
  const areaLabel={bar:"Bar",cocina:"Cocina",compartido:"Compartido",admin:"Admin"};
  const mesNombre=gastosMes.mes?MESES[(gastosMes.mes||1)-1]+" "+gastosMes.año:"";

  // Row helper: [bar col, cocina col, total col]
  const Row=({label,bar,coc,tot,isNeg,bold,sub})=>(
    <tr style={{borderTop:"1px solid "+C.border}}>
      <td style={{padding:"7px 12px",fontSize:11,color:bold?C.ink:C.ink3,fontWeight:bold?700:400}}>
        {label}{sub&&<span style={{fontSize:9,color:C.ink4,marginLeft:6}}>{sub}</span>}
      </td>
      {[bar,coc,tot].map((v,i)=>{
        const col=isNeg?C.red:(v>0?C.green:v<0?C.red:C.ink4);
        const display=isNeg&&v>0?"("+mxn(v)+")":mxn(Math.abs(v));
        return <td key={i} style={{padding:"7px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:bold?700:500,fontSize:11,color:col}}>{display}</td>;
      })}
    </tr>
  );

  const MESES_NOMBRES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const mesLabel=gastosMes?.mes?MESES_NOMBRES[gastosMes.mes-1]+" "+gastosMes.año:"Mes";

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Toggle semanal / mensual */}
      <div style={{display:"flex",gap:0,background:C.s3,borderRadius:8,padding:3,border:"1px solid "+C.border,alignSelf:"flex-start"}}>
        {[{id:"semanal",label:"Esta semana"},{id:"mensual",label:mesLabel}].map(({id,label})=>(
          <button key={id} onClick={()=>setVista(id)}
            style={{background:vista===id?C.blue:"transparent",color:vista===id?"#000":C.ink3,border:"none",borderRadius:6,padding:"6px 18px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
            {label}
          </button>
        ))}
      </div>

      {/* Vista mensual */}
      {vista==="mensual"&&(
        <BalanceMensualView mesData={mesData} mesLoading={mesLoading}
          gfEdit={gfEdit} setGfEdit={setGfEdit} gfSaving={gfSaving} saveGF={saveGF} delGF={delGF}
          gastosMes={gastosMes}/>
      )}

      {/* Vista semanal */}
      {vista==="semanal"&&<>

      {/* Aviso sin datos de ventas por grupo */}
      {!hasGrupos&&ventasFallback===0&&(
        <div style={{background:C.s2,border:"1px dashed "+C.amber,borderRadius:8,padding:"10px 14px",fontSize:11,color:C.amber}}>
          ⚠ Sin datos de ventas para esta semana. Sincroniza Drive o selecciona otra semana.
        </div>
      )}
      {!hasGrupos&&ventasFallback>0&&(
        <div style={{background:C.s2,border:"1px dashed "+C.amber,borderRadius:8,padding:"10px 14px",fontSize:11,color:C.amber}}>
          ⚠ Sin ventas por grupo — mostrando total de ventas_mesero sin split Bar/Cocina. Sincroniza Drive para ver el desglose.
        </div>
      )}

      {/* KPI resumen */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <KPI label="Ventas totales"  value={mxn(ventasTot)}                  color={C.green}/>
        <KPI label="Egresos totales" value={"("+mxn(nomTot+cpTot+gfTot)+")"} color={C.red}/>
        <KPI label="Utilidad bruta"  value={mxn(utilTot)}                    color={utilTot>=0?C.green:C.red}/>
        <KPI label="Margen"          value={pct(margen)}                      color={margen>=0?C.teal:C.red}/>
      </div>

      {/* Estado de resultados */}
      <div style={{background:C.s2,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",background:C.s3,borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.ink3,textTransform:"uppercase",letterSpacing:1}}>Estado de Resultados</span>
          <div style={{display:"flex",gap:16}}>
            {[{l:"Bar",c:C.blue},{l:"Restaurante",c:C.amber},{l:"Total",c:C.green}].map(({l,c})=>(
              <span key={l} style={{fontSize:9,fontWeight:700,color:c,textTransform:"uppercase"}}>{l}</span>
            ))}
          </div>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:C.s3}}>
              <th style={{padding:"6px 12px",textAlign:"left",fontSize:9,color:C.ink4,fontWeight:600,width:"42%"}}>CONCEPTO</th>
              {["BAR","RESTAURANTE","TOTAL"].map(h=><th key={h} style={{padding:"6px 12px",textAlign:"right",fontSize:9,color:C.ink4,fontWeight:600}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {/* Ventas */}
            <Row label="Ventas" bar={hasGrupos?ventasBar:ventasFallback} coc={hasGrupos?ventasCocina:0} tot={ventasTot} bold/>
            {!hasGrupos&&ventasFallback>0&&(
              <tr><td colSpan={4} style={{padding:"2px 12px 6px",fontSize:9,color:C.ink4}}>
                * Sin split por grupo. Bar / Restaurante = 0 hasta sincronizar ventas_grupo.
              </td></tr>
            )}
            {/* Nómina */}
            <Row label="(−) Nómina Bar"   bar={nomBar}       coc={0}       tot={nomBar}        isNeg sub="Mesero/Barra/Caja/Comodín"/>
            <Row label="(−) Nómina Admin" bar={nomAdmin}     coc={0}       tot={nomAdmin}       isNeg sub="Andrea/Gerardo"/>
            <Row label="(−) Nómina Cocina"bar={0}            coc={nomCoc}  tot={nomCoc}         isNeg sub="Personal cocina"/>
            {/* Compras */}
            <Row label="(−) Compras"      bar={cpBarT}       coc={cpCocT}  tot={cpTot}          isNeg/>
            {/* Gastos Fijos */}
            <Row label="(−) Gastos Fijos" bar={gfBarT}       coc={gfCocT}  tot={gfTot}          isNeg sub="semanal prorr."/>
            {/* Utilidad */}
            <tr style={{borderTop:"2px solid "+C.border,background:C.s3}}>
              <td style={{padding:"9px 12px",fontSize:12,fontWeight:800,color:C.ink}}>Utilidad</td>
              {[utilBar,utilCoc,utilTot].map((v,i)=>(
                <td key={i} style={{padding:"9px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:800,fontSize:12,color:v>=0?C.green:C.red}}>{mxn(v)}</td>
              ))}
            </tr>
            <tr style={{background:C.s3}}>
              <td style={{padding:"4px 12px 9px",fontSize:10,color:C.ink4}}>Margen</td>
              {[ventasBar>0?utilBar/ventasBar*100:0, ventasCocina>0?utilCoc/ventasCocina*100:0, margen].map((v,i)=>(
                <td key={i} style={{padding:"4px 12px 9px",textAlign:"right",fontSize:10,color:v>=0?C.teal:C.red}}>{pct(v)}</td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>

      {/* Gastos Fijos mensuales */}
      <div style={{background:C.s2,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",background:C.s3,borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.ink3,textTransform:"uppercase",letterSpacing:1}}>Gastos Fijos — {mesNombre}</span>
          <span style={{fontSize:9,color:C.ink4}}>Prorrateado ÷ 4.33 semanas/mes</span>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:C.s3}}>
              {["Concepto","Área","Mensual","Semanal",""].map((h,i)=>(
                <th key={i} style={{padding:"6px 12px",textAlign:i>=2&&i<4?"right":"left",fontSize:9,color:C.ink4,fontWeight:600,textTransform:"uppercase"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {GASTOS_CONCEPTOS.map(({concepto,area:defArea})=>{
              const rec=gfData.find(g=>g.concepto===concepto);
              const monto=rec?.monto||0;
              const ar=rec?.area||defArea;
              const isEditing=gfEdit?.concepto===concepto;
              return(
                <tr key={concepto} style={{borderTop:"1px solid "+C.border}}>
                  <td style={{padding:"7px 12px",fontSize:11,color:C.ink}}>{concepto}</td>
                  <td style={{padding:"7px 12px"}}>
                    {isEditing?(
                      <select value={gfEdit.area} onChange={e=>setGfEdit({...gfEdit,area:e.target.value})}
                        style={{background:C.s3,border:"1px solid "+C.border,borderRadius:4,padding:"3px 6px",color:C.ink,fontSize:10}}>
                        <option value="bar">Bar</option>
                        <option value="cocina">Cocina</option>
                        <option value="compartido">Compartido</option>
                      </select>
                    ):(
                      <span style={{padding:"2px 8px",borderRadius:10,background:(areaColor[ar]||C.ink4)+"20",color:areaColor[ar]||C.ink4,fontSize:9,fontWeight:700}}>
                        {areaLabel[ar]||ar}
                      </span>
                    )}
                  </td>
                  <td style={{padding:"7px 12px",textAlign:"right"}}>
                    {isEditing?(
                      <input type="number" value={gfEdit.monto} onChange={e=>setGfEdit({...gfEdit,monto:e.target.value})} min="0"
                        style={{width:90,background:C.s3,border:"1px solid "+C.blue,borderRadius:4,padding:"3px 6px",color:C.ink,fontSize:11,textAlign:"right"}}/>
                    ):(
                      <span style={{fontFamily:"monospace",fontSize:11,color:monto>0?C.ink:C.ink4}}>{monto>0?mxn(monto):"—"}</span>
                    )}
                  </td>
                  <td style={{padding:"7px 12px",textAlign:"right",fontFamily:"monospace",fontSize:10,color:C.ink4}}>
                    {monto>0?mxn(monto/4.33):"—"}
                  </td>
                  <td style={{padding:"7px 12px",textAlign:"right",display:"flex",gap:6,justifyContent:"flex-end"}}>
                    {isEditing?(
                      <>
                        <button onClick={()=>saveGF(concepto,gfEdit.area,gfEdit.monto)} disabled={gfSaving}
                          style={{background:C.green,color:"#000",border:"none",borderRadius:4,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>✓</button>
                        <button onClick={()=>setGfEdit(null)}
                          style={{background:C.s4,color:C.ink3,border:"none",borderRadius:4,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>✕</button>
                      </>
                    ):(
                      <>
                        <button onClick={()=>setGfEdit({concepto,area:ar,monto:monto||""})}
                          style={{background:C.s4,color:C.ink3,border:"none",borderRadius:4,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>✎</button>
                        {rec&&<button onClick={()=>delGF(rec.id)} style={{background:"transparent",border:"none",color:C.red,cursor:"pointer",fontSize:12}}>✕</button>}
                      </>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{borderTop:"2px solid "+C.border,background:C.s3}}>
              <td style={{padding:"8px 12px",fontWeight:700,fontSize:11,color:C.ink}}>Total mensual</td>
              <td/>
              <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:700,fontSize:12,color:C.ink}}>
                {mxn(gfData.reduce((a,g)=>a+(g.monto||0),0))}
              </td>
              <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:700,fontSize:11,color:C.ink3}}>
                {mxn(gfData.reduce((a,g)=>a+(g.monto||0),0)/4.33)}
              </td>
              <td/>
            </tr>
          </tfoot>
        </table>
      </div>
      </>}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]         =useState("dashboard");
  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const [semOffset,setSemOffset]=useState(0);
  const base=getSemanaActual();
  const semana=semOffset===0?base:getSemanaOffset(base,semOffset);
  const mes=semana.dom.getMonth();
  const anio=semana.dom.getFullYear();

  // Data state
  const [data,setData]       =useState({ventas:[],asistencias:[]});
  const [ventasProp,setVentasProp]=useState([]);
  const [semPropKey,setSemPropKey]=useState("");
  const [grupos,setGrupos]   =useState([]);
  const [overrides,setOverrides]=useState({});
  const [showSal,setShowSal] =useState(false);
  const [comidaMap,setComidaMap]=useState({});
  const [status,setStatus]   =useState("idle");
  const [msg,setMsg]         =useState("");
  const [showReporte,setShowReporte]=useState(false);
  // Historial asistencias anual
  const [porSemanaHistorial,setPorSemanaHistorial]=useState({});
  const [loadingHistorial,setLoadingHistorial]=useState(false);
  const anioHistorial=new Date().getFullYear();

  const loadData=useCallback(async(semanaKey)=>{
    try{
      setStatus("checking");
      const url=API+"/api/dashboard/semana-actual"+(semanaKey?"?semana="+semanaKey:"");
      const r=await fetch(url);
      const d=await r.json();
      if(d.ok){
        const n=arr=>(arr||[]).map(m=>({...m,prop_tarjeta:+(m.prop_tarjeta??m.propTarjeta??m.propina??0)||0}));
        setData({ventas:n(d.ventasMesero),asistencias:d.asistencias||[],semana:d.semana,semanaAsist:d.semanaAsist||d.semana,semanaVentas:d.semanaVentasActual||d.semana,compras:d.compras||[],gastosFijos:d.gastosFijos||[],gastosMes:d.gastosMes||null});
        setVentasProp(n(d.ventasMeseroPropinas||[]));
        if(d.semanaVentasPropinas)setSemPropKey(d.semanaVentasPropinas);
        setGrupos(d.ventasGrupo||[]);
        const cm={};
        (d.comida||[]).forEach(c=>{cm[(c.nombre||"").toLowerCase()]=+(c.monto)||0;});
        setComidaMap(cm);
        setStatus("online");
        const la=(d.semanaAsist||d.semana||"").replace(/\d{4}-/g,"").replace(/_a_/," – ");
        setMsg("✓ "+la);
      }else{setStatus("offline");setMsg("Error del servidor");}
    }catch(e){setStatus("offline");setMsg("Sin conexión: "+e.message);}
  },[]);

  const loadHistorial=useCallback(async()=>{
    try{
      setLoadingHistorial(true);
      const r=await fetch(API+"/api/dashboard/asistencias-anio?anio="+new Date().getFullYear());
      const d=await r.json();
      if(d.ok) setPorSemanaHistorial(d.porSemana||{});
    }catch(e){console.error("historial error",e);}
    finally{setLoadingHistorial(false);}
  },[]);

  const doSync=async()=>{
    try{
      setStatus("sync");setMsg("Sincronizando Drive...");
      const r=await fetch(API+"/api/sync/manual",{method:"POST",headers:{"Content-Type":"application/json","x-app-secret":"BarHub2026"}});
      const d=await r.json();
      if(d.ok){setMsg("✓ "+(d.resultado?.procesados||0)+" archivos sincronizados");await loadData(semOffset===0?undefined:semana.key);}
    }catch(e){setMsg("Error al sincronizar");setStatus("offline");}
  };

  // Carga historial anual al montar
  useEffect(()=>{ loadHistorial(); },[]);

  // Recarga COMPLETA cada vez que cambia la semana (también en el mount inicial)
  useEffect(()=>{
    loadData(semana.key);
  },[semana.key]);

  const stCol={idle:C.ink4,checking:C.amber,online:C.green,offline:C.red,sync:C.blue}[status]||C.ink4;

  const renderContent=()=>{
    const props={data,semana,overrides,setOverrides,showSal,setShowSal,comidaMap,setComidaMap,ventasProp,semPropKey,grupos,porSemanaHistorial,loadingHistorial,anioHistorial,setTab,loadData};
    switch(tab){
      case "dashboard":   return <TabDashboard {...props}/>;
      case "nomina":      return <TabNomina {...props}/>;
      case "propinas":    return <TabPropinas {...props}/>;
      case "asistencias": return <TabAsistencias {...props}/>;
      case "ventas":      return <TabVentas {...props}/>;
      case "compras":     return <TabCompras  data={data} semana={semana} loadData={loadData}/>;
      case "inventarios": return <ComingSoon modulo="Inventarios" subgrupos={["Stock actual","Entradas/Salidas","Alertas","Valuación"]}/>;
      case "balance":     return <TabBalance  data={data} semana={semana} grupos={grupos} overrides={overrides} comidaMap={comidaMap} ventasProp={ventasProp} loadData={loadData}/>;
      case "costeos":     return <ComingSoon modulo="Costeos" subgrupos={["Costos cocina","Costos bar","% Costo/Venta","Recetas"]}/>;
      case "tickets":     return <ComingSoon modulo="Tickets" subgrupos={["Subir foto ticket","Análisis Claude","Cruce con facturas","Resumen semanal"]}/>;
      case "facturas":    return <ComingSoon modulo="Facturas" subgrupos={["Gmail CFDI","Por proveedor","Pendientes de pago","CrossCheck órdenes"]}/>;
      default:            return <TabDashboard {...props}/>;
    }
  };

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      {/* SIDEBAR */}
      <Sidebar tab={tab} setTab={setTab} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}/>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* HEADER */}
        <div style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {tab!=="dashboard"&&<button onClick={()=>setTab("dashboard")} style={{padding:"5px 10px",borderRadius:6,border:"1px solid "+C.greenDim,background:"none",color:C.green,fontSize:10,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>‹ Dashboard</button>}
            <PeriodSelector semana={semana} setSemanaOffset={setSemOffset} semOffset={semOffset} mes={mes} anio={anio}/>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:stCol}}/>
            {msg&&<span style={{fontSize:9,color:C.ink4,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg}</span>}
            <button onClick={()=>setShowReporte(true)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+C.border,background:C.s2,color:C.purple,fontSize:10,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>📄 Reporte</button>
            <button onClick={doSync} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+C.border,background:C.s2,color:C.green,fontSize:10,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>⟳ Sincronizar Drive</button>
          </div>
        </div>

        {/* CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
          {renderContent()}
        </div>
      </div>
    {showReporte&&<ModalReporte data={data} semana={semana} overrides={overrides} comidaMap={comidaMap} ventasProp={ventasProp} grupos={grupos} onClose={()=>setShowReporte(false)}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js',{scope:'/barhub'})
      .catch(err=>console.warn('[SW] No se pudo registrar:',err));
  });
}
</script>
</body>
</html>
