<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BarHub · Soja Restoran · Mexicali</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0F0E;color:#E8EDE9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;overflow:hidden}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#141716}
::-webkit-scrollbar-thumb{background:#2A2E2B;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const API="https://web-production-1975f.up.railway.app";

// ── COLORES ──────────────────────────────────────────────────────────────────
const C={
  bg:"#0D0F0E",surface:"#141716",s2:"#1B1E1C",s3:"#222623",s4:"#282C29",
  border:"#2A2E2B",ink:"#E8EDE9",ink2:"#B4BDB5",ink3:"#7A8A7C",ink4:"#4A574C",
  green:"#4ADE80",greenDim:"#166534",red:"#F87171",amber:"#FCD34D",
  blue:"#60A5FA",teal:"#2DD4BF",purple:"#A78BFA",pink:"#F472B6",orange:"#FB923C",
};
const AREA_COLOR={Caja:C.purple,Barra:C.teal,Cocina:C.amber,Mesero:C.blue,Admin:C.green,"Comodín":C.pink,"Comodin":C.pink};

// ── EMPLEADOS & CONSTANTES ───────────────────────────────────────────────────
const EMPLEADOS_BASE=[
  {nombre:"Yulisa", area:"Caja",    salDiario:1000,hrsProg:20,pagoFijo:2000,adminFijo:false},
  {nombre:"Alexis", area:"Barra",   salDiario:700, hrsProg:46,pagoFijo:null,adminFijo:false},
  {nombre:"Omar",   area:"Barra",   salDiario:750, hrsProg:20,pagoFijo:1500,adminFijo:false},
  {nombre:"Angel",  area:"Mesero",  salDiario:560, hrsProg:46,pagoFijo:null,adminFijo:false},
  {nombre:"Saul",   area:"Mesero",  salDiario:750, hrsProg:20,pagoFijo:1500,adminFijo:false},
  {nombre:"Edith",  area:"Cocina",  salDiario:680, hrsProg:46,pagoFijo:null,adminFijo:false},
  {nombre:"Jorge",  area:"Cocina",  salDiario:680, hrsProg:46,pagoFijo:null,adminFijo:false},
  {nombre:"Erick",  area:"Comodín", salDiario:500, hrsProg:46,pagoFijo:null,adminFijo:false},
  {nombre:"Andrea", area:"Admin",   salDiario:800, hrsProg:46,pagoFijo:4000,adminFijo:true},
  {nombre:"Gerardo",area:"Admin",   salDiario:1200,hrsProg:46,pagoFijo:6000,adminFijo:true},
];
const PISO=[
  {nombre:"Yulisa",area:"Caja",  hrsProg:20},
  {nombre:"Alexis",area:"Barra", hrsProg:46},
  {nombre:"Omar",  area:"Barra", hrsProg:20},
  {nombre:"Edith", area:"Cocina",hrsProg:46},
  {nombre:"Jorge", area:"Cocina",hrsProg:46},
];
const TOTAL_HRS=PISO.reduce((a,p)=>a+p.hrsProg,0);
const PCT_MOCHE=0.045,PCT_TERM=0.08;

const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const mxn =v=>"$"+Math.round(v).toLocaleString("es-MX");
const mxnD=v=>"$"+Number(v).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct =v=>Number(v).toFixed(1)+"%";
const fmt =d=>d.toISOString().split("T")[0];

function getSemanaActual(){
  const hoy=new Date(),dow=hoy.getDay(),d=dow===0?7:dow;
  const dom=new Date(hoy); dom.setDate(hoy.getDate()-d);
  const sab=new Date(dom); sab.setDate(dom.getDate()+6);
  return {dom,sab,key:fmt(dom)+"_a_"+fmt(sab),label:dom.getDate()+" "+MESES[dom.getMonth()].slice(0,3)+" – "+sab.getDate()+" "+MESES[sab.getMonth()].slice(0,3)};
}
function getSemanaOffset(base,offset){
  const dom=new Date(base.dom); dom.setDate(dom.getDate()+offset*7);
  const sab=new Date(dom); sab.setDate(dom.getDate()+6);
  return {dom,sab,key:fmt(dom)+"_a_"+fmt(sab),label:dom.getDate()+" "+MESES[dom.getMonth()].slice(0,3)+" – "+sab.getDate()+" "+MESES[sab.getMonth()].slice(0,3)};
}

// ── CÁLCULO NÓMINA ───────────────────────────────────────────────────────────
function calcNomina(asistencias,ventas,overrides,comidaMap,ventasProp){
  const mocheMap={},propMap={};
  (ventas||[]).forEach(m=>{const k=m.nombre?.toLowerCase();mocheMap[k]=(m.venta||0)*PCT_MOCHE;});
  const src=ventasProp&&ventasProp.length?ventasProp:ventas;
  (src||[]).forEach(m=>{const k=m.nombre?.toLowerCase();propMap[k]=(m.prop_tarjeta??m.propTarjeta??m.propina??0)*(1-PCT_TERM);});
  const totalMoche=Object.values(mocheMap).reduce((a,v)=>a+v,0);
  const pisoMap={};
  PISO.forEach(p=>{
    const a=(asistencias||[]).find(x=>x.nombre?.toLowerCase()===p.nombre.toLowerCase());
    const hb=a?(a.horas_reales||0):0;
    const he=(p.hrsProg>0&&hb>=p.hrsProg*.9)?p.hrsProg:hb;
    pisoMap[p.nombre.toLowerCase()]=p.hrsProg>0?((p.hrsProg/TOTAL_HRS)*totalMoche)*(he/p.hrsProg):0;
  });
  return EMPLEADOS_BASE.map(emp=>{
    const k=emp.nombre.toLowerCase();
    const pf=(overrides||{})[k]?.pagoFijo??emp.pagoFijo;
    const a=(asistencias||[]).find(x=>x.nombre?.toLowerCase()===k);
    const enDoc=emp.adminFijo||!!a;
    const hb=(enDoc&&!emp.adminFijo)?(a?.horas_reales||0):0;
    const hp=emp.hrsProg||0;
    const completo=emp.adminFijo||(hp>0&&hb>=hp*.9);
    const dias=emp.adminFijo?5:(a?.dias_asistidos||0);
    let sueldo=0;
    if(!enDoc&&!emp.adminFijo)sueldo=0;
    else if(pf!=null)sueldo=(emp.adminFijo||completo)?pf:Math.round((hb/hp)*pf);
    else sueldo=emp.salDiario*dias;
    const moche=mocheMap[k]||0,pt=propMap[k]||0,pp=pisoMap[k]||0,cm=(comidaMap||{})[k]||0;
    const total=sueldo-moche+pt+pp;
    return{...emp,pagoFijo:pf,dias,sueldo,moche,propTarjeta:pt,propPiso:pp,comida:cm,total,totalNeto:Math.max(0,total-cm),horasReales:completo?hp:hb,enDocumento:enDoc};
  });
}

// ── UI COMPONENTS ─────────────────────────────────────────────────────────────
function Av({n,c,size=26}){return <div style={{width:size,height:size,borderRadius:"50%",background:c+"22",border:"1px solid "+c+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.34,fontWeight:700,color:c,flexShrink:0}}>{(n||"?")[0].toUpperCase()}</div>;}
function Badge({label,color,bg}){return <span style={{padding:"2px 7px",borderRadius:4,background:bg||color+"22",color,fontSize:8,fontWeight:700}}>{label}</span>;}
function KPI({label,value,sub,color,trend}){
  return <div style={{background:C.s2,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px"}}>
    <div style={{fontSize:7,textTransform:"uppercase",letterSpacing:"0.1em",color:C.ink4,marginBottom:4}}>{label}</div>
    <div style={{fontSize:18,fontWeight:800,color:color||C.ink,fontFamily:"monospace"}}>{value}</div>
    {sub&&<div style={{fontSize:8,color:C.ink4,marginTop:2}}>{sub}</div>}
    {trend!=null&&<div style={{fontSize:8,color:trend>=0?C.green:C.red,marginTop:2}}>{trend>=0?"↑":"↓"} {Math.abs(trend).toFixed(1)}% vs sem ant</div>}
  </div>;
}
function TH({cols}){return <thead><tr>{cols.map((c,i)=><th key={i} style={{padding:"8px 10px",textAlign:i>1?"right":"left",fontSize:7,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.ink4,borderBottom:"1px solid "+C.border,whiteSpace:"nowrap"}}>{c}</th>)}</tr></thead>;}
function Card({title,children,action}){return(
  <div style={{background:C.s2,border:"1px solid "+C.border,borderRadius:10,padding:"14px 16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.13em",textTransform:"uppercase",color:C.ink4}}>{title}</span>
      {action}
    </div>
    {children}
  </div>
);}
function ComingSoon({modulo,subgrupos}){return(
  <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{background:C.s2,border:"1px dashed "+C.border,borderRadius:12,padding:"32px 24px",textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:12}}>🚧</div>
      <div style={{fontSize:16,fontWeight:700,color:C.ink,marginBottom:6}}>{modulo}</div>
      <div style={{fontSize:11,color:C.ink4,marginBottom:20}}>Módulo en desarrollo · Fase 2</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
        {subgrupos.map((s,i)=><span key={i} style={{padding:"4px 12px",borderRadius:20,background:C.s3,border:"1px solid "+C.border,fontSize:9,color:C.ink3}}>{s}</span>)}
      </div>
    </div>
  </div>
);}

// ── SIDEBAR NAV ───────────────────────────────────────────────────────────────
const NAV=[
  {id:"dashboard",label:"Dashboard Ejecutivo",icon:"◈",group:null},
  {group:"OPERACIONES"},
  {id:"nomina",   label:"Nómina",             icon:"◉",parent:"nomina_prop"},
  {id:"propinas", label:"Propinas",            icon:"✦",parent:"nomina_prop"},
  {id:"asistencias",label:"Asistencias",       icon:"◷"},
  {id:"ventas",   label:"Ventas",              icon:"◆"},
  {group:"FINANZAS"},
  {id:"compras",  label:"Compras",             icon:"🛒"},
  {id:"inventarios",label:"Inventarios",       icon:"📦"},
  {id:"balance",  label:"Balance General",     icon:"⚖"},
  {id:"costeos",  label:"Costeos",             icon:"🧮"},
  {group:"DOCUMENTOS"},
  {id:"tickets",  label:"Tickets",             icon:"🧾"},
  {id:"facturas", label:"Facturas",            icon:"📋"},
];

function Sidebar({tab,setTab,collapsed,setCollapsed}){
  const W=collapsed?52:200;
  return(
    <div style={{width:W,minHeight:"100vh",background:C.surface,borderRight:"1px solid "+C.border,display:"flex",flexDirection:"column",transition:"width .2s",flexShrink:0,overflow:"hidden"}}>
      {/* Logo */}
      <div style={{padding:"16px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid "+C.border,cursor:"pointer"}} onClick={()=>setCollapsed(!collapsed)}>
        <div style={{width:24,height:24,borderRadius:6,background:C.green+"22",border:"1px solid "+C.greenDim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:10,color:C.green,fontWeight:800}}>B</span>
        </div>
        {!collapsed&&<div>
          <div style={{fontSize:12,fontWeight:800,color:C.green,lineHeight:1}}>BarHub</div>
          <div style={{fontSize:7,color:C.ink4,lineHeight:1.4}}>Soja Restoran</div>
        </div>}
        {!collapsed&&<span style={{marginLeft:"auto",fontSize:10,color:C.ink4}}>‹</span>}
      </div>
      {/* Nav */}
      <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
        {NAV.map((item,i)=>{
          if(item.group)return collapsed?<div key={i} style={{height:1,background:C.border,margin:"4px 8px"}}/>:<div key={i} style={{padding:"10px 14px 4px",fontSize:7,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ink4,fontWeight:700}}>{item.group}</div>;
          const active=tab===item.id;
          return(
            <button key={i} onClick={()=>setTab(item.id)} title={collapsed?item.label:""} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:collapsed?"10px 0":"8px 14px",justifyContent:collapsed?"center":"flex-start",background:active?C.green+"15":"none",border:"none",borderLeft:active?"2px solid "+C.green:"2px solid transparent",color:active?C.green:C.ink3,fontSize:11,cursor:"pointer",transition:"all .15s"}}>
              <span style={{fontSize:12,flexShrink:0}}>{item.icon}</span>
              {!collapsed&&<span style={{fontWeight:active?600:400}}>{item.label}</span>}
            </button>
          );
        })}
      </div>
      {/* Footer */}
      {!collapsed&&<div style={{padding:"10px 14px",borderTop:"1px solid "+C.border,fontSize:8,color:C.ink4}}>
        FPA · 2026 · v2.0
      </div>}
    </div>
  );
}

// ── PERIOD SELECTOR ──────────────────────────────────────────────────────────
function PeriodSelector({semana,setSemanaOffset,semOffset,mes,anio}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <button onClick={()=>setSemanaOffset(o=>o-1)} style={{width:22,height:22,borderRadius:4,border:"1px solid "+C.border,background:C.s2,color:C.ink3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
      <div style={{background:C.s2,border:"1px solid "+C.border,borderRadius:6,padding:"3px 10px",fontSize:9,color:C.ink,fontFamily:"monospace",minWidth:140,textAlign:"center"}}>
        <span style={{color:C.ink4}}>{MESES[mes]} {anio} · </span>{semana.label}
      </div>
      <button onClick={()=>setSemanaOffset(o=>o+1)} style={{width:22,height:22,borderRadius:4,border:"1px solid "+C.border,background:C.s2,color:C.ink3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      {semOffset!==0&&<button onClick={()=>setSemanaOffset(0)} style={{padding:"2px 8px",borderRadius:4,border:"1px solid "+C.greenDim,background:"none",color:C.green,cursor:"pointer",fontSize:8}}>Hoy</button>}
    </div>
  );
}

// ── DASHBOARD EJECUTIVO ───────────────────────────────────────────────────────
function TabDashboard({data,semana,overrides,comidaMap,ventasProp,grupos}){
  const rows=calcNomina(data.asistencias,data.ventas,overrides,comidaMap,ventasProp);
  const nomTotal=rows.reduce((a,r)=>a+r.totalNeto,0);
  const nomSueldos=rows.reduce((a,r)=>a+r.sueldo,0);
  const ventasTotal=(grupos||[]).reduce((a,g)=>a+(g.venta||0),0);
  const propTotal=ventasProp&&ventasProp.length?ventasProp.reduce((a,m)=>a+(m.prop_tarjeta??m.propina??0),0):0;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Hero */}
      <div style={{background:"linear-gradient(135deg,"+C.s2+" 0%,"+C.s3+" 100%)",border:"1px solid "+C.greenDim,borderRadius:12,padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:8,letterSpacing:"0.13em",textTransform:"uppercase",color:C.ink4,marginBottom:6}}>Semana · {semana.key}</div>
          <div style={{fontSize:22,fontWeight:800,color:C.green}}>Soja Restoran · Mexicali</div>
          <div style={{fontSize:10,color:C.ink3,marginTop:4}}>Dashboard Ejecutivo 2026</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:8,color:C.ink4,marginBottom:4}}>Venta semanal</div>
          <div style={{fontSize:28,fontWeight:800,color:C.green,fontFamily:"monospace"}}>{mxnD(ventasTotal)}</div>
          <div style={{fontSize:9,color:C.ink4}}>Nómina a pagar: {mxnD(nomTotal)}</div>
        </div>
      </div>

      {/* KPIs principales */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <KPI label="Ventas totales" value={mxnD(ventasTotal)} color={C.green}/>
        <KPI label="Nómina neta" value={mxnD(nomTotal)} color={C.purple}/>
        <KPI label="Propinas tarjeta" value={mxnD(propTotal)} sub="sem anterior" color={C.teal}/>
        <KPI label="Sueldos brutos" value={mxnD(nomSueldos)} color={C.blue}/>
      </div>

      {/* Módulos — estado */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        {[
          {label:"Nómina & Propinas",   icon:"◉",value:mxnD(nomTotal),   sub:"Total a pagar",   color:C.purple, ok:true},
          {label:"Ventas",              icon:"◆",value:mxnD(ventasTotal), sub:"Venta semanal",   color:C.green,  ok:ventasTotal>0},
          {label:"Compras",             icon:"🛒",value:"Próx.",           sub:"En desarrollo",   color:C.amber,  ok:false},
          {label:"Inventarios",         icon:"📦",value:"Próx.",           sub:"En desarrollo",   color:C.orange, ok:false},
          {label:"Balance General",     icon:"⚖",value:"Próx.",           sub:"En desarrollo",   color:C.blue,   ok:false},
          {label:"Costeos",             icon:"🧮",value:"Próx.",           sub:"En desarrollo",   color:C.teal,   ok:false},
          {label:"Tickets",             icon:"🧾",value:"Próx.",           sub:"En desarrollo",   color:C.pink,   ok:false},
          {label:"Facturas",            icon:"📋",value:"Próx.",           sub:"En desarrollo",   color:C.red,    ok:false},
        ].map((m,i)=>(
          <div key={i} style={{background:C.s2,border:"1px solid "+(m.ok?C.border:C.border),borderRadius:8,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,opacity:m.ok?1:0.5}}>
            <div style={{width:36,height:36,borderRadius:8,background:m.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{m.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:8,color:C.ink4,textTransform:"uppercase",letterSpacing:"0.08em"}}>{m.label}</div>
              <div style={{fontSize:15,fontWeight:700,color:m.ok?m.color:C.ink4,fontFamily:"monospace"}}>{m.value}</div>
              <div style={{fontSize:8,color:C.ink4}}>{m.sub}</div>
            </div>
            <div style={{width:8,height:8,borderRadius:"50%",background:m.ok?C.green:C.ink4,flexShrink:0}}/>
          </div>
        ))}
      </div>

      {/* Resumen nómina */}
      <Card title={"Nómina semana · "+semana.key}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <TH cols={["Empleado","Área","Sueldo","Moche","Prop.T","Prop.P","Comida","TOTAL"]}/>
          <tbody>
            {rows.map((r,i)=>{const col=AREA_COLOR[r.area]||C.ink4;return(
              <tr key={i} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":C.s3+"60"}}>
                <td style={{padding:"8px 10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><Av n={r.nombre} c={col} size={22}/><span style={{fontSize:10,fontWeight:600}}>{r.nombre}</span></div></td>
                <td style={{padding:"8px 10px"}}><Badge label={r.area} color={col} bg={col+"15"}/></td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:10,fontFamily:"monospace",color:C.ink2}}>{r.sueldo>0?mxn(r.sueldo):"—"}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:10,fontFamily:"monospace",color:r.moche>0?C.red:C.ink4}}>{r.moche>0?"("+mxnD(r.moche)+")":"-"}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:10,fontFamily:"monospace",color:r.propTarjeta>0?C.teal:C.ink4}}>{r.propTarjeta>0?mxnD(r.propTarjeta):"-"}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:10,fontFamily:"monospace",color:r.propPiso>0?C.blue:C.ink4}}>{r.propPiso>0?mxnD(r.propPiso):"-"}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:10,fontFamily:"monospace",color:r.comida>0?C.red:C.ink4}}>{r.comida>0?"("+mxnD(r.comida)+")":"-"}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:12,fontFamily:"monospace",fontWeight:800,color:r.totalNeto>0?C.green:C.ink4}}>{r.totalNeto>0?mxnD(r.totalNeto):"—"}</td>
              </tr>
            );})}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ── TAB NÓMINA ────────────────────────────────────────────────────────────────
function TabNomina({data,semana,overrides,setOverrides,showSal,setShowSal,comidaMap,setComidaMap,ventasProp}){
  const rows=calcNomina(data.asistencias,data.ventas,overrides,comidaMap,ventasProp);
  const ts=rows.reduce((a,r)=>a+r.sueldo,0);
  const tm=rows.reduce((a,r)=>a+r.moche,0);
  const tt=rows.reduce((a,r)=>a+r.propTarjeta,0);
  const tp=rows.reduce((a,r)=>a+r.propPiso,0);
  const tcm=rows.reduce((a,r)=>a+r.comida,0);
  const tNet=rows.reduce((a,r)=>a+r.totalNeto,0);
  const save=(n,m)=>fetch(API+"/api/dashboard/comida",{method:"POST",headers:{"Content-Type":"application/json","x-app-secret":"BarHub2026"},body:JSON.stringify({semana:semana.key,nombre:n,monto:m})});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {showSal&&(
        <div style={{position:"fixed",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
          <div style={{background:C.s2,border:"1px solid "+C.border,borderRadius:12,padding:24,minWidth:340,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:13,fontWeight:700}}>Editar Salarios Semanales</span>

// ── TAB PROPINAS ──────────────────────────────────────────────────────────────
function TabPropinas({data,semana,ventasProp,semPropKey}){
  const ventasActual=data.ventas||[];
  const tm=ventasActual.reduce((a,m)=>a+(m.venta||0),0)*PCT_MOCHE;
  const src=ventasProp&&ventasProp.length?ventasProp:ventasActual;
  const tt=src.reduce((a,m)=>a+(m.prop_tarjeta??m.propina??0),0);
  const nt=tt*(1-PCT_TERM);
  const todos=[...ventasActual];
  src.forEach(p=>{if(!todos.some(m=>m.nombre?.toLowerCase()===p.nombre?.toLowerCase()))todos.push({...p,venta:0});});
  const rep=PISO.map(p=>{
    const a=(data.asistencias||[]).find(x=>x.nombre?.toLowerCase()===p.nombre.toLowerCase());
    const hb=a?(a.horas_reales||0):0;
    const hr=(p.hrsProg>0&&hb>=p.hrsProg*.9)?p.hrsProg:hb;
    const cuota=(p.hrsProg/TOTAL_HRS)*tm;
    const ajuste=p.hrsProg>0?cuota*(hr/p.hrsProg):0;
    return{...p,hr,enDocumento:!!a,cuota,ajuste,perdido:cuota-ajuste};
  });
  const sob=nt-rep.reduce((a,p)=>a+p.ajuste,0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        <KPI label="Moche 4.5%" value={mxn(tm)} color={C.red}/>
        <KPI label="Propinas tarjeta (bruto)" value={mxnD(tt)} sub={semPropKey||"sem anterior"} color={C.teal}/>
        <KPI label="Neto (−8% terminal)" value={mxnD(nt)} color={C.green}/>
      </div>
      <Card title={"Propinas tarjeta · col. PROPINA · "+(semPropKey||"sem anterior")}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <TH cols={["Mesero","Venta actual","Moche","PROPINA sem ant","−8%","Neto"]}/>
          <tbody>
            {todos.map((m,i)=>{
              const mc=(m.venta||0)*PCT_MOCHE;
              const mp=src.find(p=>p.nombre?.toLowerCase()===m.nombre?.toLowerCase());
              const pr=mp?.prop_tarjeta??mp?.propina??0;
              const co=pr*PCT_TERM,ne=pr-co;
              return(
                <tr key={i} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":C.s3+"60"}}>
                  <td style={{padding:"10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><Av n={m.nombre} c={C.blue}/><span style={{fontSize:11,fontWeight:600}}>{m.nombre}</span></div></td>
                  <td style={{padding:"10px",textAlign:"right",fontSize:12,fontFamily:"monospace",color:C.ink2}}>{mxnD(m.venta||0)}</td>
                  <td style={{padding:"10px",textAlign:"right",fontSize:12,fontFamily:"monospace",color:C.red}}>({mxnD(mc)})</td>
                  <td style={{padding:"10px",textAlign:"right",fontSize:12,fontFamily:"monospace",color:C.teal}}>{pr>0?mxnD(pr):"—"}</td>
                  <td style={{padding:"10px",textAlign:"right",fontSize:12,fontFamily:"monospace",color:C.red}}>{co>0?"("+mxnD(co)+")":"-"}</td>
                  <td style={{padding:"10px",textAlign:"right",fontSize:13,fontFamily:"monospace",fontWeight:800,color:ne>0?C.green:C.ink4}}>{ne>0?mxnD(ne):"—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
      <Card title={"Reparto a piso · "+mxnD(tm)+" ÷ "+TOTAL_HRS+"h"}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <TH cols={["Empleado","Área","Hrs Prog","Hrs Real","Cuota","Ajuste","A Cobrar"]}/>
          <tbody>
            {rep.map((p,i)=>{const col=AREA_COLOR[p.area]||C.ink4;return(
              <tr key={i} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":C.s3+"60"}}>
                <td style={{padding:"10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><Av n={p.nombre} c={col}/><span style={{fontSize:11,fontWeight:600}}>{p.nombre}</span></div></td>
                <td style={{padding:"10px"}}><Badge label={p.area} color={col} bg={col+"15"}/></td>
                <td style={{padding:"10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.ink3}}>{p.hrsProg}h</td>
                <td style={{padding:"10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:!p.enDocumento?C.ink4:p.hr<p.hrsProg?C.amber:C.green}}>{p.enDocumento?p.hr+"h":<span style={{fontSize:9,color:C.ink4}}>No asistió</span>}</td>
                <td style={{padding:"10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.amber}}>{mxnD(p.cuota)}</td>
                <td style={{padding:"10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:p.perdido>0.01?C.red:C.ink4}}>{p.perdido>0.01?"("+mxnD(p.perdido)+")":"-"}</td>
                <td style={{padding:"10px",textAlign:"right",fontSize:12,fontFamily:"monospace",fontWeight:800,color:p.ajuste>0?C.blue:C.ink4}}>{p.ajuste>0?mxnD(p.ajuste):"$0"}</td>
              </tr>
            );})}
          </tbody>
        </table>
        {sob>0.01&&<div style={{marginTop:10,padding:"8px 12px",background:C.s3,borderRadius:6,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:9,color:C.amber}}>Sobrante → Caja</span><span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:C.amber}}>{mxnD(sob)}</span></div>}
      </Card>
    </div>
  );
}

                  <td style={{padding:"9px 10px",textAlign:"right"}}>

                      <div style={{width:60,height:5,background:C.s3,borderRadius:3}}><div style={{width:Math.min(cumple,100)+"%",height:"100%",background:ok?C.green:C.amber,borderRadius:3}}/></div>
                      <span style={{fontSize:9,fontFamily:"monospace",color:ok?C.green:C.amber}}>{pct(cumple)}</span>
                    </div>:<span style={{fontSize:9,color:C.ink4}}>—</span>}

                  <td style={{padding:"9px 10px",textAlign:"right"}}>

                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );

// ── TAB VENTAS ────────────────────────────────────────────────────────────────
function TabVentas({data,grupos,semana,ventasProp,semPropKey}){

  const totalM=ventasM.reduce((a,m)=>a+(m.venta||0),0);
  const sorted=(grupos||[]).sort((a,b)=>(b.venta||0)-(a.venta||0));
  const totalG=sorted.reduce((a,g)=>a+(g.venta||0),0);
  const maxV=sorted[0]?.venta||1;
  const cols=[C.purple,C.blue,C.teal,C.green,C.amber,C.pink,C.red];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <KPI label="Venta total (grupos)" value={mxnD(totalG)} color={C.green}/>
        <KPI label="Venta por mesero" value={mxnD(totalM)} color={C.blue}/>
        <KPI label="Grupos distintos" value={sorted.length} color={C.purple}/>
        <KPI label="Artículos vendidos" value={sorted.reduce((a,g)=>a+(g.cantidad||0),0).toLocaleString("es-MX")} sub="unidades" color={C.teal}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Card title={"Ventas por mesero · "+semana.label}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <TH cols={["Mesero","Venta","Moche","Prop.T"]}/>
            <tbody>
              {ventasM.map((m,i)=>{
                const mc=(m.venta||0)*PCT_MOCHE;
                const mp=(ventasProp||[]).find(p=>p.nombre?.toLowerCase()===m.nombre?.toLowerCase());
                const pt=mp?.prop_tarjeta??mp?.propina??0;
                return(
                  <tr key={i} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":C.s3+"60"}}>
                    <td style={{padding:"9px 10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><Av n={m.nombre} c={C.blue}/><span style={{fontSize:11,fontWeight:600}}>{m.nombre}</span></div></td>
                    <td style={{padding:"9px 10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.green,fontWeight:700}}>{mxnD(m.venta||0)}</td>
                    <td style={{padding:"9px 10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.red}}>({mxnD(mc)})</td>
                    <td style={{padding:"9px 10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.teal}}>{pt>0?mxnD(pt):"-"}</td>
                  </tr>
                );
              })}
              <tr style={{borderTop:"2px solid "+C.border,background:C.s3}}>
                <td colSpan={1} style={{padding:"9px 10px",fontSize:9,fontWeight:700,color:C.ink4}}>TOTAL</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontSize:12,fontFamily:"monospace",fontWeight:800,color:C.green}}>{mxnD(totalM)}</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.red}}>({mxnD(totalM*PCT_MOCHE)})</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontSize:11,fontFamily:"monospace",color:C.teal}}>{mxnD((ventasProp||[]).reduce((a,m)=>a+(m.prop_tarjeta??m.propina??0),0))}</td>
              </tr>
            </tbody>
          </table>
        </Card>
        <Card title={"Ventas por grupo · "+semana.label}>
          {sorted.length===0?<div style={{color:C.ink4,fontSize:10,padding:20,textAlign:"center"}}>Sin datos. Sincroniza Drive.</div>:
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <TH cols={["Grupo","Venta","% ","Barra"]}/>
            <tbody>
              {sorted.slice(0,15).map((g,i)=>{
                const p2=totalG>0?((g.venta||0)/totalG*100):0;
                const bw=totalG>0?((g.venta||0)/maxV*100):0;
                const col=cols[i%cols.length];
                return(
                  <tr key={i} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":C.s3+"60"}}>
                    <td style={{padding:"7px 10px"}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:col}}/><span style={{fontSize:10}}>{g.grupo}</span></div></td>
                    <td style={{padding:"7px 10px",textAlign:"right",fontSize:10,fontFamily:"monospace",color:C.ink2}}>{mxnD(g.venta)}</td>
                    <td style={{padding:"7px 10px",textAlign:"right",fontSize:9,fontFamily:"monospace",color:C.ink3}}>{p2.toFixed(1)}%</td>
                    <td style={{padding:"7px 10px",minWidth:70}}><div style={{background:C.s3,borderRadius:3,height:6}}><div style={{width:bw+"%",height:"100%",background:col,borderRadius:3}}/></div></td>
                  </tr>
                );
              })}
            </tbody>
          </table>}
        </Card>
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]         =useState("dashboard");
  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const [semOffset,setSemOffset]=useState(0);
  const base=getSemanaActual();
  const semana=semOffset===0?base:getSemanaOffset(base,semOffset);
  const mes=semana.dom.getMonth();
  const anio=semana.dom.getFullYear();

  // Data state
  const [data,setData]       =useState({ventas:[],asistencias:[]});
  const [ventasProp,setVentasProp]=useState([]);
  const [semPropKey,setSemPropKey]=useState("");
  const [grupos,setGrupos]   =useState([]);
  const [overrides,setOverrides]=useState({});
  const [showSal,setShowSal] =useState(false);
  const [comidaMap,setComidaMap]=useState({});
  const [status,setStatus]   =useState("idle");
  const [msg,setMsg]         =useState("");

  const loadData=useCallback(async()=>{
    try{
      setStatus("checking");
      const r=await fetch(API+"/api/dashboard/semana-actual");
      const d=await r.json();
      if(d.ok){
        const n=arr=>(arr||[]).map(m=>({...m,prop_tarjeta:m.prop_tarjeta??m.propTarjeta??m.propina??0}));
        setData({ventas:n(d.ventasMesero),asistencias:d.asistencias||[]});
        setVentasProp(n(d.ventasMeseroPropinas));
        if(d.semanaVentasPropinas)setSemPropKey(d.semanaVentasPropinas);
        if(d.ventasGrupo?.length)setGrupos(d.ventasGrupo);
        if(d.comida?.length){const cm={};d.comida.forEach(c=>{cm[c.nombre.toLowerCase()]=c.monto||0;});setComidaMap(cm);}
        setStatus("online");setMsg("✓ Datos actualizados");
      }
    }catch(e){setStatus("offline");setMsg("Sin conexión");}
  },[]);

  const doSync=async()=>{
    try{
      setStatus("sync");setMsg("Sincronizando Drive...");
      const r=await fetch(API+"/api/sync/manual",{method:"POST",headers:{"Content-Type":"application/json","x-app-secret":"BarHub2026"}});
      const d=await r.json();
      if(d.ok){setMsg("✓ "+(d.resultado?.procesados||0)+" archivos sincronizados");await loadData();}
    }catch(e){setMsg("Error al sincronizar");setStatus("offline");}
  };

  useEffect(()=>{loadData();},[]);

  const stCol={idle:C.ink4,checking:C.amber,online:C.green,offline:C.red,sync:C.blue}[status]||C.ink4;

  const renderContent=()=>{
    const props={data,semana,overrides,setOverrides,showSal,setShowSal,comidaMap,setComidaMap,ventasProp,semPropKey,grupos};
    switch(tab){
      case "dashboard":   return <TabDashboard {...props}/>;
      case "nomina":      return <TabNomina {...props}/>;
      case "propinas":    return <TabPropinas {...props}/>;
      case "asistencias": return <TabAsistencias {...props}/>;
      case "ventas":      return <TabVentas {...props}/>;
      case "compras":     return <ComingSoon modulo="Compras" subgrupos={["Órdenes de compra","Por proveedor","Por categoría","CrossCheck tickets"]}/>;
      case "inventarios": return <ComingSoon modulo="Inventarios" subgrupos={["Stock actual","Entradas/Salidas","Alertas","Valuación"]}/>;
      case "balance":     return <ComingSoon modulo="Balance General" subgrupos={["Ingresos vs Egresos","Estado de resultados","Margen","Comparativo mensual"]}/>;
      case "costeos":     return <ComingSoon modulo="Costeos" subgrupos={["Costos cocina","Costos bar","% Costo/Venta","Recetas"]}/>;
      case "tickets":     return <ComingSoon modulo="Tickets" subgrupos={["Subir foto ticket","Análisis Claude","Cruce con facturas","Resumen semanal"]}/>;
      case "facturas":    return <ComingSoon modulo="Facturas" subgrupos={["Gmail CFDI","Por proveedor","Pendientes de pago","CrossCheck órdenes"]}/>;
      default:            return <TabDashboard {...props}/>;
    }
  };

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      {/* SIDEBAR */}
      <Sidebar tab={tab} setTab={setTab} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}/>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* HEADER */}
        <div style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <PeriodSelector semana={semana} setSemanaOffset={setSemOffset} semOffset={semOffset} mes={mes} anio={anio}/>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:stCol}}/>
            {msg&&<span style={{fontSize:9,color:C.ink4,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg}</span>}
            <button onClick={doSync} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+C.border,background:C.s2,color:C.green,fontSize:10,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>⟳ Sincronizar Drive</button>
          </div>
        </div>

        {/* CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
